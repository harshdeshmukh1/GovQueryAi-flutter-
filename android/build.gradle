buildscript {
    dependencies {
        classpath 'com.android.tools.build:gradle:7.3.0'  // Make sure this matches your Flutter version
        classpath 'com.google.gms:google-services:4.3.10' // Firebase services (if needed)
    }
    repositories {
        google()
        mavenCentral()
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
